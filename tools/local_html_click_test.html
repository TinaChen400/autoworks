<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local HTML Click Test</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f7fb;
      color: #162033;
    }

    main {
      width: min(760px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid #c8d2e0;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(22, 32, 51, 0.12);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 24px;
      font-size: 17px;
      line-height: 1.5;
    }

    label {
      display: flex;
      align-items: center;
      gap: 18px;
      width: fit-content;
      font-size: 26px;
      font-weight: 700;
    }

    input[type="checkbox"] {
      width: 72px;
      height: 72px;
      accent-color: #177245;
      cursor: pointer;
    }

    textarea {
      box-sizing: border-box;
      width: 100%;
      min-height: 92px;
      margin-top: 28px;
      padding: 14px;
      border: 1px solid #aeb9c8;
      border-radius: 6px;
      font-size: 20px;
      resize: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Local Automation Test Page</h1>
    <p>This page is for local automation testing only. It has no external resources, no form submission, and no navigation controls.</p>
    <label for="amazoncentral-test-checkbox">
      <input id="amazoncentral-test-checkbox" type="checkbox">
      AmazonCentral Test Checkbox
    </label>
    <textarea id="status" aria-label="checkbox status" readonly>unchecked</textarea>
  </main>
  <script>
    const checkbox = document.getElementById("amazoncentral-test-checkbox");
    const status = document.getElementById("status");
    checkbox.addEventListener("change", () => {
      status.value = checkbox.checked ? "checked" : "unchecked";
    });
  </script>
</body>
</html>
